package com.example.steydant

import android.content.Intent
import android.content.SharedPreferences
import android.os.Bundle
import android.view.View
import android.widget.*
import androidx.appcompat.app.AppCompatActivity
import androidx.core.content.ContextCompat
import androidx.lifecycle.lifecycleScope
import kotlinx.coroutines.*

class MainActivity : AppCompatActivity() {
    private lateinit var containerStudents: LinearLayout
    private lateinit var etStudentName: EditText
    private lateinit var sharedPreferences: SharedPreferences

    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContentView(R.layout.activity_main)

        containerStudents = findViewById(R.id.containerStudents)
        etStudentName = findViewById(R.id.etStudentName)
        sharedPreferences = getSharedPreferences("MosqueData", MODE_PRIVATE)

        loadSavedStudents()

        findViewById<Button>(R.id.btnAdd).setOnClickListener {
            val name = etStudentName.text.toString().trim()
            if (name.isNotEmpty()) {
                addStudentRow(name)
                saveStudentName(name)
                etStudentName.setText("")
            }
        }

        findViewById<Button>(R.id.btnSendReport).setOnClickListener {
            generateAndSendReport()
        }
    }

    private fun addStudentRow(name: String) {
        val layout = LinearLayout(this).apply {
            orientation = LinearLayout.VERTICAL
            setPadding(30, 30, 30, 30)
            elevation = 8f
            setBackgroundResource(android.R.drawable.editbox_background)
            val params = LinearLayout.LayoutParams(
                LinearLayout.LayoutParams.MATCH_PARENT,
                LinearLayout.LayoutParams.WRAP_CONTENT
            )
            params.setMargins(0, 15, 0, 15)
            layoutParams = params
        }

        // سطر الاسم مع زر الحذف
        val headerLayout = LinearLayout(this).apply {
            orientation = LinearLayout.HORIZONTAL
        }

        val tvName = TextView(this).apply {
            text = name
            textSize = 18f
            layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f)
            setTextColor(ContextCompat.getColor(this@MainActivity, android.R.color.black))
        }

        val btnDelete = Button(this).apply {
            text = "X"
            setTextColor(ContextCompat.getColor(this@MainActivity, android.R.color.holo_red_dark))
            setOnClickListener {
                containerStudents.removeView(layout)
                removeStudentFromPrefs(name)
            }
        }

        headerLayout.addView(tvName)
        headerLayout.addView(btnDelete)

        val rg = RadioGroup(this).apply {
            orientation = RadioGroup.HORIZONTAL
            val options = arrayOf("حاضر", "متأخر", "غائب")
            for (opt in options) {
                val rb = RadioButton(this@MainActivity).apply {
                    text = opt
                    id = View.generateViewId()
                }
                addView(rb)
            }
            (getChildAt(0) as RadioButton).isChecked = true
        }

        val etRecitation = EditText(this).apply { hint = "ماذا حفظ اليوم؟" }

        layout.addView(headerLayout)
        layout.addView(rg)
        layout.addView(etRecitation)
        containerStudents.addView(layout)
    }

    private fun generateAndSendReport() {
        lifecycleScope.launch(Dispatchers.Default) {
            val total = withContext(Dispatchers.Main) { containerStudents.childCount }
            if (total == 0) return@launch

            val report = StringBuilder()
            report.append("📝 تقرير حلقة المسجد\n------------------\n")

            for (i in 0 until total) {
                val data = withContext(Dispatchers.Main) {
                    val layout = containerStudents.getChildAt(i) as LinearLayout
                    val header = layout.getChildAt(0) as LinearLayout
                    val tvName = header.getChildAt(0) as TextView
                    val rg = layout.getChildAt(1) as RadioGroup
                    val etRec = layout.getChildAt(2) as EditText

                    val status = layout.findViewById<RadioButton>(rg.checkedRadioButtonId)?.text ?: "غائب"
                    Triple(tvName.text.toString(), status, etRec.text.toString())
                }
                report.append("👤 ${data.first}\n📌 ${data.second}\n📖 ${data.third}\n------------------\n")
            }

            withContext(Dispatchers.Main) {
                val intent = Intent(Intent.ACTION_SEND).apply {
                    type = "text/plain"
                    putExtra(Intent.EXTRA_TEXT, report.toString())
                }
                startActivity(Intent.createChooser(intent, "إرسال عبر:"))
            }
        }
    }

    private fun saveStudentName(name: String) {
        val set = sharedPreferences.getStringSet("StudentList", HashSet()) ?: HashSet()
        val newSet = HashSet(set)
        newSet.add(name)
        sharedPreferences.edit().putStringSet("StudentList", newSet).apply()
    }

    private fun removeStudentFromPrefs(name: String) {
        val set = sharedPreferences.getStringSet("StudentList", HashSet()) ?: HashSet()
        val newSet = HashSet(set)
        newSet.remove(name)
        sharedPreferences.edit().putStringSet("StudentList", newSet).apply()
    }

    private fun loadSavedStudents() {
        val set = sharedPreferences.getStringSet("StudentList", HashSet()) ?: HashSet()
        for (name in set) { name?.let { addStudentRow(it) } }
    }
}
